spring.application.name=backend
# ?? Datasource ???????????????????????????????????????????????
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mboalink}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# ?? JPA ??????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ?? JWT ??????????????????????????????????????????????????????
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:2592000000}

# ?? OTP ??????????????????????????????????????????????????????
otp.mode=${OTP_MODE:MOCK}
otp.expiration-minutes=${OTP_EXPIRATION_MINUTES:10}

# ?? Email ????????????????????????????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mboalink.mail.from=${MAIL_FROM:noreply@mboalink.cm}

# ?? CORS ?????????????????????????????????????????????????????
mboalink.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# ?? Serveur ??????????????????????????????????????????????????
server.port=${PORT:8080}