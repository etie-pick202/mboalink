spring.application.name=backend

# Datasource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mboalink}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:BvcX+wbSO+IVjiBGFAjrr8xwcZJtH8omNV+QgDnnXJxiv6rwtMKiawrwMPawTJODzOBxSOhj/RNkvnkm6VXZaA==}
jwt.expiration=${JWT_EXPIRATION:7200000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:2592000000}

# OTP
otp.mode=${OTP_MODE:MOCK}
otp.expiration-minutes=${OTP_EXPIRATION_MINUTES:10}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:dev@mboalink.cm}
spring.mail.password=${MAIL_PASSWORD:secret}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mboalink.mail.from=${MAIL_FROM:noreply@mboalink.cm}

# SMS (Textbelt — "textbelt" = clé partagée gratuite, 1 SMS/jour/IP.
# Pour la production, définir SMS_PROVIDER_KEY avec une clé Textbelt payante.)
sms.provider.url=${SMS_PROVIDER_URL:https://textbelt.com/text}
sms.provider.key=${SMS_PROVIDER_KEY:textbelt}

# CORS
mboalink.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# Campay Integration
campay.base.url=${CAMPAY_BASE_URL:https://demo.campay.net/api/}
campay.access.token=${CAMPAY_ACCESS_TOKEN:a7661a7e2f38ced24684d8f1c40258c4749bb8d2}
campay.webhook.url=${CAMPAY_WEBHOOK_URL:https://mboalink.onrender.com/api/v1/payments/webhook/campay}
campay.redirect.url=${CAMPAY_REDIRECT_URL:https://mboalink.onrender.com/payment/success}

# Serveur
server.port=${PORT:8080}

management.health.mail.enabled=false
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never