# ============================================================
# CI Backend — Build & Vérification
# Déclenché sur chaque push feature/ et PR vers develop/main
# ============================================================
name: CI Backend

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'backend/**'

jobs:
  build:
    name: Build & Compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        working-directory: backend
        run: chmod +x gradlew



      - name: Build sans tests
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/mboalink
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          JWT_SECRET: dGVzdFNlY3JldEtleU11c3RCZUF0TGVhc3QyNTZCaXRzTG9uZ0Zvckhta
          JWT_EXPIRATION: 900000
          JWT_REFRESH_EXPIRATION: 2592000000
          OTP_MODE: MOCK
          MAIL_USERNAME: test@test.com
          MAIL_PASSWORD: test
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew build -x test --no-daemon

      - name: Vérification de la compilation
        working-directory: backend
        run: ./gradlew compileJava --no-daemon
        env:
          JWT_SECRET: dGVzdFNlY3JldEtleU11c3RCZUF0TGVhc3QyNTZCaXRzTG9uZ0Zvckhta
          JWT_EXPIRATION: 900000
          JWT_REFRESH_EXPIRATION: 2592000000
          OTP_MODE: MOCK
          MAIL_USERNAME: test@test.com
          MAIL_PASSWORD: test

      - name: Checkstyle — vérification du style de code
        working-directory: backend
        env:
            JWT_SECRET: dGVzdFNlY3JldEtleU11c3RCZUF0TGVhc3QyNTZCaXRzTG9uZ0Zvckhta
            JWT_EXPIRATION: 900000
            JWT_REFRESH_EXPIRATION: 2592000000
            OTP_MODE: MOCK
            MAIL_USERNAME: test@test.com
            MAIL_PASSWORD: test
        run: ./gradlew checkstyleMain --no-daemon

      - name: Upload rapport Checkstyle
        if: always()
        uses: actions/upload-artifact@v7
        with:
                name: checkstyle-report
                path: backend/build/reports/checkstyle/